services:
  postgres:
    image: postgres:15-alpine
    container_name: PatientDemo_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - PatientDemo_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  patientdemo.webapi:
    image: ${DOCKER_REGISTRY-}patientdemowebapi
    build:
      context: .
      dockerfile: PatientDemo.WebApi/Dockerfile
    container_name: PatientDemo_webapi
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5255:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - PatientDemo_network
    restart: unless-stopped
    volumes:
      - ./logs/webapi:/app/logs

  patientdemo.consoleapp:
    image: ${DOCKER_REGISTRY-}patientdemoconsoleapp
    build:
      context: .
      dockerfile: PatientDemo.ConsoleApp/Dockerfile
    container_name: PatientDemo_console
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - PatientDemo_network
    restart: no
    volumes:
      - ./logs/consoleapp:/app/logs

networks:
  PatientDemo_network:
    driver: bridge
    name: PatientDemo_network

volumes:
  postgres_data:
    name: PatientDemo_postgres_data
  pgadmin_data:
    name: PatientDemo_pgadmin_data

